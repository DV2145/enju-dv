<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>내 신청내역</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>

.order-card{
    background:rgba(15,15,15,0.8);
    border:1px solid #c89b3c;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

.order-title{
    font-size:18px;
    font-weight:bold;
    color:#ffd76a;
}

.order-price{
    margin-top:8px;
    margin-bottom:8px;
}

.status-wait{
    color:#ffc107;
    font-weight:bold;
}

.status-progress{
    color:#4da3ff;
    font-weight:bold;
}

.status-complete{
    color:#4caf50;
    font-weight:bold;
}

.status-cancel{
    color:#f44336;
    font-weight:bold;
}

</style>

</head>
<body>

<header>
    <div class="logo">🐉 엔주의 DV데삭</div>
</header>

<div class="container">

    <div class="card">

        <h2>📋 내 신청내역</h2>

        <div id="orders">
            불러오는 중...
        </div>

        <br>

        <a href="index.html">🏠 메인으로</a>

    </div>

</div>

<script>

async function loadMyOrders(){

    const {
        data: { user }
    } = await supabaseClient.auth.getUser();

    if(!user){
        location.href = "login.html";
        return;
    }

    const { data, error } = await supabaseClient
        .from("orders")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", {
            ascending: false
        });

    if(error){
        console.error(error);
        return;
    }

    const div = document.getElementById("orders");

    div.innerHTML = "";

    if(data.length === 0){
        div.innerHTML = "신청 내역이 없습니다.";
        return;
    }

    data.forEach(order => {

        let statusClass = "status-wait";

        if(order.status === "진행중"){
            statusClass = "status-progress";
        }

        if(order.status === "완료"){
            statusClass = "status-complete";
        }

        if(order.status === "취소"){
            statusClass = "status-cancel";
        }

        div.innerHTML += `
            <div class="order-card">

                <div class="order-title">
                    ${order.product_name}
                </div>

                <div class="order-price">
                    💰 ${Number(order.product_price).toLocaleString()}P
                </div>

                <div class="${statusClass}">
                    📌 ${order.status}
                </div>

            </div>
        `;
    });

}

loadMyOrders();

</script>

</body>
</html>
