<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자 페이지</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

</head>
<body>

<div class="container">

    <div class="card">
        <h2>주문 관리</h2>

        <div id="orders"></div>

    </div>

</div>

<script>

async function loadOrders(){

    const { data, error } = await supabaseClient
        .from("orders")
        .select("*")
        .order("created_at", { ascending:false });

    if(error){
        console.error(error);
        return;
    }

    const div = document.getElementById("orders");

    div.innerHTML = "";

    data.forEach(order => {

        div.innerHTML += `
        <div style="margin-bottom:20px">

            <b>${order.nickname}</b><br>

            ${order.product_name}<br>

            ${Number(order.product_price).toLocaleString()}P<br>

            상태 : ${order.status}<br><br>

            <button onclick="completeOrder(${order.id})">
완료
</button>

<button onclick="cancelOrder(${order.id})">
취소
</button>

        </div>
        <hr>
        `;
    });

}

async function completeOrder(orderId){

    const { data, error } = await supabaseClient
        .from("orders")
        .update({
            status:"완료"
        })
        .eq("id", orderId);

    console.log("update 결과", data);
    console.log("update 에러", error);

    if(error){
        alert(JSON.stringify(error));
        return;
    }

    alert("완료 처리됨");

    loadOrders();
}

    async function cancelOrder(orderId){

    const { data: order } = await supabaseClient
        .from("orders")
        .select("*")
        .eq("id", orderId)
        .single();

    if(order.status !== "대기중"){
        alert("대기중 주문만 취소할 수 있습니다.");
        return;
    }

    const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", order.user_id)
        .single();

    const newPoint =
        profile.points + order.product_price;

    await supabaseClient
        .from("profiles")
        .update({
            points: newPoint
        })
        .eq("id", order.user_id);

    await supabaseClient
        .from("orders")
        .update({
            status: "취소"
        })
        .eq("id", orderId);

    alert("주문 취소 및 환불 완료");

    loadOrders();
}
    
window.completeOrder = completeOrder;
window.cancelOrder = cancelOrder;
    
loadOrders();

</script>

</body>
</html>
