<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자 페이지</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

</head>
<body>

<div class="container">

```
<div class="card">
    <h2>주문 관리</h2>

    <div id="orders">불러오는 중...</div>

</div>
```

</div>

<script>

async function checkAdmin(){

    const {
        data: { user }
    } = await supabaseClient.auth.getUser();

    if(!user){
        location.href = "login.html";
        return false;
    }

    const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

    if(profile.nickname !== "엔주"){
        alert("관리자만 접근 가능합니다.");
        location.href = "index.html";
        return false;
    }

    return true;
}

async function loadOrders(){

    const isAdmin = await checkAdmin();

    if(!isAdmin) return;

    const { data, error } = await supabaseClient
        .from("orders")
        .select("*")
        .order("created_at", { ascending:false });

    if(error){
        console.error(error);
        return;
    }

    const div = document.getElementById("orders");

    div.innerHTML = "";

    data.forEach(order => {

        let buttons = "";

        if(order.status === "대기중"){
            buttons = `
                <button onclick="completeOrder(${order.id})">
                    완료
                </button>

                <button onclick="cancelOrder(${order.id})">
                    취소
                </button>
            `;
        }

        div.innerHTML += `
        <div style="margin-bottom:20px">

            <b>${order.nickname}</b><br>

            ${order.product_name}<br>

            ${Number(order.product_price).toLocaleString()}P<br>

            상태 : ${order.status}<br><br>

            ${buttons}

        </div>
        <hr>
        `;
    });

}

async function completeOrder(orderId){

    await supabaseClient
        .from("orders")
        .update({
            status:"완료"
        })
        .eq("id", orderId);

    alert("완료 처리됨");

    loadOrders();
}

async function cancelOrder(orderId){

    const { data: order } = await supabaseClient
        .from("orders")
        .select("*")
        .eq("id", orderId)
        .single();

    if(order.status !== "대기중"){
        alert("대기중 주문만 취소할 수 있습니다.");
        return;
    }

    const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", order.user_id)
        .single();

    const newPoint =
        profile.points + order.product_price;

    await supabaseClient
        .from("profiles")
        .update({
            points: newPoint
        })
        .eq("id", order.user_id);

    await supabaseClient
        .from("orders")
        .update({
            status: "취소"
        })
        .eq("id", orderId);

    alert("주문 취소 및 환불 완료");

    loadOrders();
}

window.completeOrder = completeOrder;
window.cancelOrder = cancelOrder;

loadOrders();

</script>

</body>
</html>
