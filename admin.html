앞으로도 이 방식으로 할게.

네가 파일 올림
내가 수정된 전체 파일 만들어서 돌려줌
부분 수정은 안 시킴

이게 제일 편하고 오류도 적을 거야. 

<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자 페이지</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

</head>
<body>

<div class="container">

<div class="card">

    <h2>관리자 대시보드</h2>

    <p>총 회원수 : <span id="userCount">0</span>명</p>
    <p>대기중 주문 : <span id="waitingCount">0</span>건</p>
    <p>진행중 주문 : <span id="progressCount">0</span>건</p>
    <p>완료 주문 : <span id="completeCount">0</span>건</p>
    <p>취소 주문 : <span id="cancelCount">0</span>건</p>

</div>

<div class="card">

    <h2>포인트 지급</h2>

    <p>현재 RLS 문제로 보류중</p>

</div>

<div class="card">

    <h2>주문 관리</h2>

    <div id="orders">
        불러오는 중...
    </div>

</div>

</div>

<script>

async function checkAdmin(){

    const {
        data: { user }
    } = await supabaseClient.auth.getUser();

    if(!user){
        location.href = "login.html";
        return false;
    }

    const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

    if(profile.nickname !== "엔주"){
        alert("관리자만 접근 가능합니다.");
        location.href = "index.html";
        return false;
    }

    return true;
}

async function loadDashboard(){

    const { data: users } = await supabaseClient
        .from("profiles")
        .select("*");

    const { data: orders } = await supabaseClient
        .from("orders")
        .select("*");

    document.getElementById("userCount").innerText =
        users ? users.length : 0;

    document.getElementById("waitingCount").innerText =
        orders ? orders.filter(x => x.status === "대기중").length : 0;

    document.getElementById("progressCount").innerText =
        orders ? orders.filter(x => x.status === "진행중").length : 0;

    document.getElementById("completeCount").innerText =
        orders ? orders.filter(x => x.status === "완료").length : 0;

    document.getElementById("cancelCount").innerText =
        orders ? orders.filter(x => x.status === "취소").length : 0;
}

async function loadOrders(){

    const isAdmin = await checkAdmin();

    if(!isAdmin) return;

    const { data } = await supabaseClient
        .from("orders")
        .select("*")
        .order("created_at", {
            ascending:false
        });

    const div =
        document.getElementById("orders");

    div.innerHTML = "";

    data.forEach(order => {

        let buttons = "";

        if(order.status === "대기중"){

            buttons = `
                <button onclick="progressOrder(${order.id})">
                    진행중
                </button>

                <button onclick="cancelOrder(${order.id})">
                    취소
                </button>
            `;
        }
        else if(order.status === "진행중"){

            buttons = `
                <button onclick="completeOrder(${order.id})">
                    완료
                </button>
            `;
        }

        div.innerHTML += `
            <div style="margin-bottom:20px">

                <b>${order.nickname}</b><br>

                ${order.product_name}<br>

                ${Number(order.product_price).toLocaleString()}P<br>

                상태 : ${order.status}<br><br>

                ${buttons}

            </div>

            <hr>
        `;
    });

}


async function progressOrder(orderId){

    await supabaseClient
        .from("orders")
        .update({
            status:"진행중"
        })
        .eq("id", orderId);

    alert("진행중 처리됨");

    loadOrders();
    loadDashboard();
}

async function completeOrder(orderId){

    await supabaseClient
        .from("orders")
        .update({
            status:"완료"
        })
        .eq("id", orderId);

    alert("완료 처리됨");

    loadOrders();
    loadDashboard();
}

async function cancelOrder(orderId){

    const { data: order } = await supabaseClient
        .from("orders")
        .select("*")
        .eq("id", orderId)
        .single();

    if(order.status !== "대기중"){
        alert("대기중 주문만 취소할 수 있습니다.");
        return;
    }

    const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", order.user_id)
        .single();

    const newPoint =
        profile.points + order.product_price;

    await supabaseClient
        .from("profiles")
        .update({
            points: newPoint
        })
        .eq("id", order.user_id);

    await supabaseClient
        .from("orders")
        .update({
            status:"취소"
        })
        .eq("id", orderId);

    alert("주문 취소 및 환불 완료");

    loadOrders();
    loadDashboard();
}

window.progressOrder = progressOrder;
window.completeOrder = completeOrder;
window.cancelOrder = cancelOrder;

loadDashboard();
loadOrders();

</script>

</body>
</html>
